<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel de Administración de Turnos</title>
  <style>
    body { font-family: Arial, sans-serif; background-color: #f2f2f2; margin: 0; padding: 0; }
    h1 { background-color: #004080; color: white; padding: 20px; margin: 0; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 10px; border: 1px solid #ddd; text-align: center; }
    th { background-color: #0066cc; color: white; }
    button { padding: 6px 12px; background-color: #007bff; color: white; border: none; cursor: pointer; border-radius: 4px; }
    button:hover { background-color: #0056b3; }
    .etapa { font-weight: bold; }
  </style>
</head>
<body>
  <h1>🛠 Panel de Administración - Constructora Bisonó</h1>
  <table id="tablaTurnos">
    <thead>
      <tr>
        <th>#</th>
        <th>Nombre</th>
        <th>Teléfono</th>
        <th>Fecha y Hora</th>
        <th>Etapa</th>
        <th>Acción</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    const apiURL = "https://turnos-bisono-sembrador6-v2n2.onrender.com";

    async function cargarTurnos() {
      const res = await fetch(`${apiURL}/turnos`);
      const data = await res.json();
      const tbody = document.querySelector("#tablaTurnos tbody");
      tbody.innerHTML = "";

      data.resultados.forEach(turno => {
        const fila = document.createElement("tr");
        fila.innerHTML = `
          <td>${turno.numero}</td>
          <td>${turno.nombre}</td>
          <td>${turno.telefono}</td>
          <td>${new Date(turno.fechaHora).toLocaleString()}</td>
          <td class="etapa">${turno.etapa}</td>
          <td>
            <select onchange="cambiarEtapa(${turno.numero}, this.value)">
              <option disabled selected>Actualizar</option>
              <option>Pendiente</option>
              <option>Visitando Apartamentos Modelo</option>
              <option>Precalificando con el Banco</option>
              <option>OK</option>
              <option>En Proceso</option>
              <option>Finalizado</option>
            </select>
          </td>
        `;
        tbody.appendChild(fila);
      });
    }

    async function cambiarEtapa(numero, nuevaEtapa) {
      try {
        await fetch(`${apiURL}/cambiar-etapa`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ numero, nuevaEtapa })
        });
        alert("Etapa actualizada y siguiente turno notificado.");
        cargarTurnos();
      } catch (err) {
        console.error(err);
        alert("Error al cambiar etapa.");
      }
    }

    window.onload = cargarTurnos;
  </script>
</body>
</html>
