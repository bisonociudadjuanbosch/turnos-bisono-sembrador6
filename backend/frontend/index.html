<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Generar Turno - Bisonó</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 2rem; }
    #ticket-container img { max-width: 300px; margin-top: 1rem; }
  </style>
</head>
<body>
  <h1>Generar Turno</h1>

  <input type="text" id="nombre" placeholder="Tu nombre" /><br/><br/>
  <input type="text" id="telefono" placeholder="Tu teléfono" /><br/><br/>
  <button onclick="generarTurno()">Generar Turno</button><br/><br/>

  <div id="ticket-container" style="display: none;">
    <h2>Tu turno es:</h2>
    <canvas id="ticketCanvas" width="300" height="150"></canvas><br/>
    <button onclick="descargarTicket()">Descargar Ticket</button>
    <button onclick="compartirPorWhatsApp()">Compartir por WhatsApp</button>
  </div>

  <br><hr>
  <button onclick="window.location.href='/admin.html'">Ir al Panel de Administración</button>

  <script src="index.js"></script>
</body>
</html>
