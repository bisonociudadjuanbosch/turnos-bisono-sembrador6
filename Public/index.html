<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Administrativo - Bisonó</title>
  <link rel="stylesheet" href="styles.css">
  <script defer src="admin.js"></script>
</head>
<body>
  <h1>Panel de Administración - Constructora Bisonó</h1>

  <div id="filtros">
    <input type="text" id="filtro-nombre" placeholder="Nombre">
    <input type="text" id="filtro-telefono" placeholder="Teléfono">
    <input type="date" id="filtro-fecha">
    <select id="filtro-etapa">
      <option value="">Todas las etapas</option>
      <option value="Pendiente">Pendiente</option>
      <option value="Visitando apartamento modelo">Visitando apartamento modelo</option>
      <option value="Precalificando con el banco">Precalificando con el banco</option>
      <option value="En Proceso">En Proceso</option>
      <option value="Finalizado">Finalizado</option>
      <option value="OK">OK</option>
    </select>
    <button id="btn-filtrar">Generar Reporte</button>
    <button id="reiniciar-conteo">Reiniciar conteo diario</button>
  </div>

  <table id="tabla-turnos">
    <thead>
      <tr>
        <th>Turno</th>
        <th>Nombre</th>
        <th>Teléfono</th>
        <th>Estado</th>
        <th>Nuevo Estado</th>
        <th>Acciones</th>
        <th>Resultado</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</body>
</html>
