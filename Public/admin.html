<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Administrativo - Bisonó</title>
  <script defer src="admin.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f5f5f5; }
    table { border-collapse: collapse; width: 100%; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    th, td { border: 1px solid #ccc; padding: 10px; text-align: center; }
    th { background-color: #007bff; color: white; }
    .success { color: green; }
    .error { color: red; }
    select, button, input { padding: 6px 10px; border-radius: 4px; margin: 5px; }
    button { background-color: #007bff; color: white; border: none; cursor: pointer; }
    button:hover { background-color: #0056b3; }
    #filtros { margin-bottom: 20px; display: flex; flex-wrap: wrap; align-items: center; gap: 10px; }
  </style>
</head>
<body>
  <h1>Panel de Administración - Constructora Bisonó</h1>

  <div id="filtros">
    <input type="text" id="filtro-nombre" placeholder="Nombre">
    <input type="text" id="filtro-telefono" placeholder="Teléfono">
    <input type="date" id="filtro-fecha">
    <select id="filtro-etapa">
      <option value="">Todas las etapas</option>
      <option>Pendiente</option>
      <option>Visitando apartamento modelo</option>
      <option>Precalificando con el banco</option>
      <option>En Proceso</option>
      <option>Finalizado</option>
      <option>OK</option>
    </select>
    <button id="btn-filtrar">Generar Reporte</button>
    <button id="reiniciar-conteo">Reiniciar conteo diario</button>
  </div>

  <p id="conteo-total"></p>

  <table id="tabla-turnos">
    <thead>
      <tr>
        <th>Turno</th>
        <th>Nombre</th>
        <th>Teléfono</th>
        <th>Fecha de Creación</th>
        <th>Estado</th>
        <th>Nuevo Estado</th>
        <th>Acciones</th>
        <th>Resultado</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</body>
</html>
