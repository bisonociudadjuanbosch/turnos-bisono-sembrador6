<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Administrativo - Bisonó</title>
  <script defer src="admin.js"></script>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f5f5f5; }
    table { border-collapse: collapse; width: 100%; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    th, td { border: 1px solid #ccc; padding: 10px; text-align: center; }
    th { background-color: #007bff; color: white; }
    .success { color: green; }
    .error { color: red; }
    select, button { padding: 6px 10px; border-radius: 4px; }
    button { background-color: #007bff; color: white; border: none; cursor: pointer; }
    button:hover { background-color: #0056b3; }
  </style>
</head>
<body>
  <h1>Panel de Administración - Constructora Bisonó</h1>
  <table id="tabla-turnos">
    <thead>
      <tr>
        <th>Turno</th>
        <th>Nombre</th>
        <th>Teléfono</th>
        <th>Estado</th>
        <th>Nuevo Estado</th>
        <th>Acciones</th>
        <th>Resultado</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</body>
</html>
